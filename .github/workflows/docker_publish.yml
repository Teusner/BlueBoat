name: Build and Publish BlueOS Extension

# Trigger the workflow when pushing to the main branch, or manually via the UI
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU allows GitHub's x86 servers to emulate and compile ARM code
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build for standard laptops (amd64) and modern Raspberry Pi (arm64)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # This tags the image as 'latest' under your Docker Hub account
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/blueboat-controller:latest